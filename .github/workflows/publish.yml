name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  # 先运行 CI 检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -v

  # CI 通过后构建
  build:
    name: Build distribution
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tool
        run: pip install build
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # 发布到 PyPI（Trusted Publisher，无需 API Token）
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vivado-mcp
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # 发布完成后回打 PyPI JSON API 校验:
  # 0.3.9/10/11 三个 tag 因 publish 链路静默失败,
  # 直到 0.3.12 才修。从此让 PyPI 没真出现新版本时 workflow 红灯。
  verify:
    name: Verify PyPI publication
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Wait + poll PyPI JSON API
        run: |
          tag="${{ steps.ver.outputs.version }}"
          for i in $(seq 1 10); do
            got=$(curl -fsSL "https://pypi.org/pypi/vivado-mcp/json" | jq -r '.info.version')
            echo "Attempt $i: PyPI reports $got, expected $tag"
            if [ "$got" = "$tag" ]; then
              echo "PyPI refreshed to $tag"
              exit 0
            fi
            sleep 30
          done
          echo "PyPI did not update to $tag within 5 minutes"
          exit 1
